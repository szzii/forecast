{% extends "base.html" %}
{% set page_name = "trend" %}

{% block title %}历史趋势分析 | 空气质量预测系统{% endblock %}

{% block content %}
<section class="panel">
    <div class="panel-header">
        <div>
            <h2>历史趋势分析</h2>
            <p>查看年度 AQI 趋势、污染物变化和城市空气质量分布。</p>
        </div>
        <div class="toolbar">
            <label>
                年份
                <select id="trendYearSelect">
                    <option value="2024">2024</option>
                </select>
            </label>
            <button id="trendQueryButton" class="btn-primary">分析</button>
        </div>
    </div>
</section>

<section class="chart-grid chart-grid-2">
    <div class="panel chart-panel">
        <div class="panel-title">AQI 最大值 / 最小值趋势</div>
        <div id="trendAnnualChart" class="chart-box"></div>
    </div>
    <div class="panel chart-panel">
        <div class="panel-title">污染物月均值趋势</div>
        <div id="trendPrimaryPollutantChart" class="chart-box"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/trend.js') }}"></script>
{% endblock %}
