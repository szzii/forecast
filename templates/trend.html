{% extends "base.html" %}
{% set page_name = "trend" %}

{% block title %}趋势分析 | 空气质量数据分析与预测系统{% endblock %}

{% block content %}
<section class="panel">
    <div class="panel-header">
        <div>
            <h2>空气质量趋势分析</h2>
            <p>将年度分析、月度分析与城市对比合并成一个页面，保持第一版交付简单完整。</p>
        </div>
        <div class="toolbar">
            <label>
                年份
                <select id="trendYearSelect">
                    <option value="2024">2024</option>
                </select>
            </label>
            <button id="trendQueryButton" class="btn-primary">分析</button>
        </div>
    </div>
</section>

<section class="chart-grid chart-grid-2">
    <div class="panel chart-panel">
        <div class="panel-title">AQI Max / Min 趋势</div>
        <div id="trendAnnualChart" class="chart-box"></div>
    </div>
    <div class="panel chart-panel">
        <div class="panel-title">污染物月均值对比</div>
        <div id="trendPollutantChart" class="chart-box"></div>
    </div>
    <div class="panel chart-panel">
        <div class="panel-title">城市实时 AQI 排名</div>
        <div id="trendRankingChart" class="chart-box"></div>
    </div>
    <div class="panel chart-panel">
        <div class="panel-title">空气质量等级分布</div>
        <div id="trendDistributionChart" class="chart-box"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/trend.js') }}"></script>
{% endblock %}
