{% extends "base.html" %}
{% set page_name = "collect" %}

{% block title %}数据采集 | 空气质量预测系统{% endblock %}

{% block content %}
<section class="collect-workspace-grid">
    <section class="panel auto-collector-panel">
        <div class="panel-title" style="margin-bottom:14px;">采集设置</div>
        <form id="autoCollectorForm" class="auto-collector-form">
            <label class="auto-field">
                <span>采集间隔（秒）</span>
                <input id="autoCollectorInterval" name="interval_seconds" type="number" min="60" step="60">
            </label>
            <label class="auto-field">
                <span>采集小时数</span>
                <input id="autoCollectorHours" name="collection_hours" type="number" min="1" step="1">
            </label>
            <div class="upload-actions auto-actions">
                <button type="submit" class="btn-primary">保存</button>
                <button id="runAutoCollectorNowButton" type="button" class="btn-secondary">立即采集</button>
            </div>
        </form>
        <div id="autoCollectorLastRun" class="auto-last-run">上次执行：-</div>
        <div id="autoCollectorMessage" class="inline-message status-message-hidden"></div>
        <div id="autoTaskStatusCard" class="history-task-card auto-task-card">
            <div class="history-task-top">
                <div>
                    <div class="panel-title">实时任务进度</div>
                    <div id="autoTaskStatusText" class="history-task-status">当前没有实时采集任务</div>
                </div>
                <div id="autoTaskPercent" class="history-task-percent">0%</div>
            </div>
            <div class="history-progress-bar">
                <div id="autoTaskProgressBar" class="history-progress-fill"></div>
            </div>
            <div id="autoTaskMeta" class="history-task-meta"></div>
            <div id="autoTaskLogList" class="history-task-log-list"></div>
        </div>
    </section>

    <section class="panel collect-history-panel">
        <div class="panel-title" style="margin-bottom:14px;">历史采集</div>
        <div class="history-config-card">
            <div class="range-shortcuts">
                <button type="button" class="btn-secondary range-shortcut" data-days="30">近 30 天</button>
                <button type="button" class="btn-secondary range-shortcut" data-days="90">近 90 天</button>
                <button type="button" class="btn-secondary range-shortcut" data-days="365">近 365 天</button>
                <button type="button" class="btn-secondary range-shortcut" data-days="year">今年</button>
                <span id="historyRangeHint" class="range-hint">当前范围：0 天</span>
            </div>
            <form id="historyCollectorForm" class="history-form">
                <label>
                    开始日期
                    <input id="historyStartDate" name="start_date" type="date">
                </label>
                <label>
                    结束日期
                    <input id="historyEndDate" name="end_date" type="date">
                </label>
                <label>
                    采集范围
                    <select id="historyScopeSelect" name="scope">
                        <option value="all">全部城市</option>
                        <option value="province">指定省份</option>
                        <option value="city">当前城市</option>
                    </select>
                </label>
                <label>
                    省份
                    <select id="historyProvinceSelect" name="province" disabled></select>
                </label>
                <div class="upload-actions" style="grid-column: 1 / -1;">
                    <button id="historyCollectSubmitButton" type="submit" class="btn-primary">采集历史数据</button>
                </div>
            </form>
        </div>
        <div id="historyCollectorMessage" class="inline-message status-message-hidden"></div>
        <div id="historyTaskStatusCard" class="history-task-card">
            <div class="history-task-top">
                <div>
                    <div class="panel-title">历史任务进度</div>
                    <div id="historyTaskStatusText" class="history-task-status">当前没有历史采集任务</div>
                </div>
                <div id="historyTaskPercent" class="history-task-percent">0%</div>
            </div>
            <div class="history-progress-bar">
                <div id="historyTaskProgressBar" class="history-progress-fill"></div>
            </div>
            <div id="historyTaskMeta" class="history-task-meta"></div>
            <div id="historyTaskLogList" class="history-task-log-list"></div>
        </div>
    </section>
</section>

<section class="panel table-panel" style="margin-top: 22px;">
    <div class="collect-subhead collect-log-head">
        <div class="panel-title">采集日志</div>
        <p>查看各类采集任务的执行记录。</p>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>任务</th>
                    <th>来源</th>
                    <th>状态</th>
                    <th>条数</th>
                    <th>说明</th>
                    <th>执行时间</th>
                </tr>
            </thead>
            <tbody id="crawlerTaskTable"></tbody>
        </table>
    </div>
    <div id="crawlerTaskPagination" class="pagination-bar"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/collect.js') }}"></script>
{% endblock %}
